<script>

const AD_LINK = "https://omg10.com/4/10854420";

let adOpened = false;
let returned = false;

// BUTTON CLICK
document.getElementById("btn").onclick = () => {

    adOpened = true;

    // open ad
    let win = window.open("", "_blank");
    win.location.href = AD_LINK;

    document.getElementById("status").innerText = "Open ad and come back...";
};

// DETECT RETURN (WORKS ON MOBILE)
document.addEventListener("visibilitychange", () => {

    if (!document.hidden && adOpened && !returned) {
        returned = true;
        startTimer();
    }
});

// TIMER AFTER RETURN
function startTimer() {
    let t = 10;

    const interval = setInterval(() => {
        document.getElementById("status").innerText =
            "Wait " + t + " sec...";

        t--;

        if (t < 0) {
            clearInterval(interval);
            unlockReward();
        }
    }, 1000);
}

// UNLOCK
function unlockReward() {
    document.getElementById("status").innerText = "";
    document.getElementById("reward").style.display = "block";
}
