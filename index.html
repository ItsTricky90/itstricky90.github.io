<title>Unlock Reward</title>

<style>
body {
    margin:0;
    background:#0f172a;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container {
    width:90%;
    max-width:400px;
    background:#1e293b;
    padding:25px;
    border-radius:15px;
    text-align:center;
}
h2 {
    font-size: 38px;
    margin-top: 0;
    margin-bottom: 15px;
}

h3 {
    font-size: 26px;
    margin-bottom: 15px;
}

p {
    font-size: 26px;
    margin: 10px 0;
}

button {
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#6366f1;
    color:white;
    font-size:16px;
    cursor:pointer;
}

#reward { display:none; }
.warning { color:#f87171; }
.note { color:#facc15; font-size:14px; }
</style>

<body>

<div class="container">
    <h2>🎁 Unlock Reward</h2>

    <p class="Larger-text">
        ⚠️ Open the ad and COME BACK to unlock reward
    </p>

    <button id="btn">Watch & Unlock</button>

    <p id="status"></p>
    <p id="warning" class="warning"></p>

    <div id="reward">
        <h3>✅ Reward Unlocked</h3>
        <!-- 🖼️ YOUR CUSTOM IMAGE -->
        <img src="reward.jpg" style="width:100%;border-radius:10px;">
        <p class="note">
            Apne meethe ko tag karo 🥵🥵
        </p>
        <button onclick="share()">Share or you gay 😏</button>
    </div>
</div>

<script>

// 🔥 YOUR DIRECT LINK
const AD_LINK = "https://omg10.com/4/10854420";

let leftPage = false;
let returned = false;
let adblockDetected = false;

// =======================
// ADBLOCK DETECTION
// =======================
function detectAdBlock() {
    let test = document.createElement("div");
    test.className = "adsbox";
    test.style.height = "1px";
    document.body.appendChild(test);

    setTimeout(() => {
        if (test.offsetHeight === 0) {
            adblockDetected = true;
            document.getElementById("warning").innerText =
                "❌ Disable AdBlock to continue!";
        }
        test.remove();
    }, 100);
}

// =======================
// TAB DETECTION
// =======================
document.addEventListener("visibilitychange", () => {

    if (document.hidden) {
        leftPage = true;
    }

    if (!document.hidden && leftPage && !returned) {
        returned = true;
        startTimer(); // ✅ start ONLY after return
    }
});

// =======================
// START AD
// =======================
function startAd() {

    if (adblockDetected) {
        document.getElementById("warning").innerText =
            "❌ Disable AdBlock!";
        return;
    }

    document.getElementById("status").innerText = "Opening ad...";

    // 🔥 Anti-block trick
    let win = window.open("", "_blank");
    win.location.href = AD_LINK;
}

// =======================
// TIMER
// =======================
function startTimer() {
    let time = 7;

    const interval = setInterval(() => {
        document.getElementById("status").innerText =
            "Wait " + time + " sec...";

        time--;

        if (time < 0) {
            clearInterval(interval);
            unlockReward();
        }
    }, 1000);
}

// =======================
// UNLOCK
// =======================
function unlockReward() {
    document.getElementById("status").innerText = "";
    document.getElementById("reward").style.display = "block";
}

// =======================
// SHARE
// =======================
function share() {
    const msg = "😂 Tag that bro: " + window.location.href;
    navigator.clipboard.writeText(msg);
    window.open("https://wa.me/?text=" + encodeURIComponent(msg));
}

// =======================
// INIT
// =======================
document.addEventListener("DOMContentLoaded", () => {
    detectAdBlock();
    document.getElementById("btn").onclick = startAd;
});

</script>
