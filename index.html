<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Monetag Verification -->
<meta name="monetag" content="5981e855b7afc7269ed826a6103d70d9">

<title>Unlock Reward</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container {
    width:90%;
    max-width:400px;
    background:#1e293b;
    padding:25px;
    border-radius:15px;
    text-align:center;
}

button {
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#6366f1;
    color:white;
    font-size:16px;
}

#adUI, #rewardUI {
    display:none;
}
</style>
</head>

<body>

<div class="container">

    <!-- MAIN UI -->
    <div id="mainUI">
        <h2>🎁 Unlock Reward</h2>
        <button id="startBtn">Start</button>
    </div>

    <!-- AD STEP UI -->
    <div id="adUI">
        <h3>⚡ One Last Step</h3>
        <p>Click ad & come back to unlock reward</p>
        <button id="adBtn">Open Ad</button>
        <p id="status"></p>
    </div>

    <!-- REWARD UI -->
    <div id="rewardUI">
        <h3>✅ Reward Unlocked</h3>
        <img src="reward.jpg" style="width:100%;border-radius:10px;">
    </div>

</div>

<script>

// 🔥 YOUR DIRECT LINK
const AD_LINK = "https://omg10.com/4/10854420";

let adOpened = false;
let returned = false;

// STEP 1 → START
document.getElementById("startBtn").onclick = () => {
    document.getElementById("mainUI").style.display = "none";
    document.getElementById("adUI").style.display = "block";
};

// STEP 2 → OPEN AD
document.getElementById("adBtn").onclick = () => {

    adOpened = true;

    let win = window.open("", "_blank");
    win.location.href = AD_LINK;

    document.getElementById("status").innerText =
        "Ad opened. Come back to continue...";
};

// STEP 3 → DETECT RETURN
document.addEventListener("visibilitychange", () => {

    if (!document.hidden && adOpened && !returned) {
        returned = true;
        startTimer();
    }
});

// STEP 4 → TIMER
function startTimer() {
    let t = 10;

    const status = document.getElementById("status");

    const interval = setInterval(() => {
        status.innerText = "Wait " + t + " sec...";
        t--;

        if (t < 0) {
            clearInterval(interval);
            showReward();
        }
    }, 1000);
}

// STEP 5 → SHOW REWARD
function showReward() {
    document.getElementById("adUI").style.display = "none";
    document.getElementById("rewardUI").style.display = "block";
}

</script>

</body>
